action_mode: generic
tool_calling:
  mode: multi
initialization:
  agents:
    built_in: none
    class_path: null
    params: {}
  game_masters:
    built_in: default
    class_path: null
    params: {}
  simulation:
    built_in: none
    class_path: null
    params: {}
engine:
  step:
    built_in: base
    params:
      flow_order:
      - fixed_pre
      - default
      agent_to_flow: {}
  turn_policy:
    built_in: single_action
    params:
      # One post per agent per step: a clean per-agent-per-step measurement unit
      # for diversity. The turn ends after the single create_tweet; no terminal
      # FINISHED action is exposed to the model. observe_before_act=first so the
      # open arm still reads the follower timeline before posting.
      observe_before_act: first
